# Server
server.port=8080

# H2 In-Memory Database - no installation needed
spring.datasource.url=jdbc:h2:mem:kycdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Console - accessible at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# File upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# JWT secret (simple for demo purposes)
jwt.secret=kycSecretKey2024SuperLongSecretForHMACSHA256Algorithm
jwt.expiration=86400000

# Where uploaded files are stored (in-memory app, stored on disk temporarily)
file.upload-dir=uploads
