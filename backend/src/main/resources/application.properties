# Server
server.port=8080

# PostgreSQL config for production (Render)
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Disable H2 console in production
spring.h2.console.enabled=false

# JPA settings

spring.jpa.show-sql=true


# File upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=20MB

# JWT secret (simple for demo purposes)
jwt.secret=kycSecretKey2024SuperLongSecretForHMACSHA256Algorithm
jwt.expiration=86400000

# Where uploaded files are stored (in-memory app, stored on disk temporarily)
file.upload-dir=uploads
